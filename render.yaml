services:
  - type: web
    name: eduvy-ai-backend
    env: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    nativePackages:
      - ffmpeg
      - libnss3
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libxkbcommon0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libgbm1
      - libpango-1.0-0
      - libcairo2
      - libasound2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright
