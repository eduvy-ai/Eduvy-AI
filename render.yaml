services:
  - type: web
    name: eduvy-ai-backend
    env: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
